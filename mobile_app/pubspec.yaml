name: sdb_app
description: "SDB - Digital Banking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.3
  intl: ^0.20.0
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  pin_code_fields: ^8.0.1
  local_auth: ^2.3.0
  animate_do: ^3.3.4
  image_picker: ^1.2.1
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_face_detection: ^0.12.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_stripe: ^11.4.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/backgrounds/
    - assets/cards/
